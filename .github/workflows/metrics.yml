name: Metrics

on:
  schedule: [{ cron: "0 0 * * *" }]
  workflow_dispatch:

concurrency:
  group: metrics
  cancel-in-progress: true

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: runyshark
          template: classic
          filename: github-metrics.svg

          base: header, repositories
          repositories_forks: yes
          base_indepth: yes

          config_timezone: America/Mexico_City

          # Dracula theme colors
          config_order: base.header, isocalendar, languages, wakatime
          extras_css: |
            :root {
              --color-calendar-graph-day-bg: #44475a;
              --color-calendar-graph-day-L1-bg: #6272a4;
              --color-calendar-graph-day-L2-bg: #bd93f9;
              --color-calendar-graph-day-L3-bg: #ff79c6;
              --color-calendar-graph-day-L4-bg: #50fa7b;
            }
            h2, h3 { color: #bd93f9 !important; }
            svg { color: #f8f8f2; }
            .field { color: #f8f8f2 !important; }
            section > .field, .row .field { color: #f8f8f2 !important; }
          config_padding: 0, 10
          # Contributions calendar 3D isometric
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year

          # Languages
          plugin_languages: yes
          plugin_languages_limit: 8
          plugin_languages_sections: most-used

          # WakaTime (solo tiempo, lenguajes, editores, OS — SIN proyectos)
          plugin_wakatime: yes
          plugin_wakatime_token: ${{ secrets.WAKATIME_TOKEN }}
          plugin_wakatime_days: 365
          plugin_wakatime_sections: time, languages, languages-graphs, editors, os
          plugin_wakatime_limit: 5
